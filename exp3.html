<!DOCTYPE html>
<html>
<head>
    <title>Loops Example</title>
    <script>
        function printNumbers() {
            let output = "";

            output += "<b>For Loop:</b><br>";
            for (let i = 1; i <= 10; i++) {
                output += i + " ";
            }

            output += "<br><b>While Loop:</b><br>";
            let j = 1;
            while (j <= 10) {
                output += j + " ";
                j++;
            }

            output += "<br><b>Do-While Loop:</b><br>";
            let k = 1;
            do {
                output += k + " ";
                k++;
            } while (k <= 10);

            document.getElementById("result").innerHTML = output;
        }
    </script>
</head>
<body>

<button onclick="printNumbers()">Print 1 to 10</button>
<p id="result"></p>

</body>
</html>
